# UFW OkBoy - Nginx Reverse Proxy Configuration
#
# Place this file in /etc/nginx/sites-available/ufw-okboy.conf
# Then symlink: ln -s /etc/nginx/sites-available/ufw-okboy.conf /etc/nginx/sites-enabled/
#
# IMPORTANT: X-Real-IP header is CRITICAL for the server to detect the client's real IP.
# Without it, the server will see 127.0.0.1 and reject the request.

server {
    listen 443 ssl http2;
    server_name your-server.com;  # <-- Change to your domain

    # SSL certificates (adjust paths to match your setup)
    ssl_certificate     /etc/letsencrypt/live/your-server.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-server.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Rate limiting (defined in nginx.conf http block):
    #   limit_req_zone $binary_remote_addr zone=okboy:10m rate=3r/s;

    # Web client page (static HTML, no rate limit)
    location = / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # Static assets
    location /static/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        expires 1h;
    }

    # API endpoints
    location /api/ {
        # Rate limiting: 3 req/s per IP, burst of 5
        # (Web client knocks every 30s, so 3r/s is generous)
        # Add to http block: limit_req_zone $binary_remote_addr zone=okboy:10m rate=3r/s;
        limit_req zone=okboy burst=5 nodelay;

        # Pass real client IP to Flask
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host            $host;

        # Proxy to Flask backend
        proxy_pass http://127.0.0.1:5000;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # Access log for audit trail
    access_log /var/log/nginx/ufw-okboy-access.log;
    error_log  /var/log/nginx/ufw-okboy-error.log;
}
